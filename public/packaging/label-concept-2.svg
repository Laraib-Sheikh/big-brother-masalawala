  <text x="140" y="1188" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="18" font-weight="900" fill="#111827">NET WT: 100g</text>
  <text x="860" y="1188" text-anchor="end" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="18" font-weight="900" fill="#111827">MADE IN PAKISTAN</text>
  <text x="500" y="1260" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="16" font-weight="800" fill="#111827" opacity="0.7">Store in a cool, dry place · info@masalaywala.com</text>
