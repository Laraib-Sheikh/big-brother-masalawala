  <rect x="140" y="710" width="720" height="360" rx="40" fill="#ffffff" stroke="#7c2d12" stroke-opacity="0.18"/>
  <text x="180" y="780" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="22" font-weight="900" fill="#111827">Ingredients</text>
  <text x="180" y="820" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="18" fill="#111827" opacity="0.75">
    Salt, mango powder, cumin, black pepper, citric acid&
  </text>
