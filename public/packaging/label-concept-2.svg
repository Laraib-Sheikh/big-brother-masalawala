<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1400" viewBox="0 0 1000 1400" fill="none">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#fffbeb"/>
    </linearGradient>
  </defs>

  <!-- Paper label -->
  <rect x="40" y="40" width="920" height="1320" rx="56" fill="url(#paper)" stroke="#7c2d12" stroke-opacity="0.25" stroke-width="6"/>

  <!-- Border pattern -->
  <rect x="92" y="92" width="816" height="1216" rx="44" fill="none" stroke="#7c2d12" stroke-opacity="0.18" stroke-width="4" stroke-dasharray="10 12"/>

  <!-- Brand -->
  <text x="500" y="180" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="42" font-weight="1000" fill="#7c2d12">MASALAY WALA</text>
  <text x="500" y="220" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="16" font-weight="800" fill="#111827" opacity="0.75">ORGANIC SPICES · HANDPICKED QUALITY</text>

  <!-- Product -->
  <text x="500" y="420" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="84" font-weight="1100" fill="#111827">CHAAT</text>
  <text x="500" y="500" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="68" font-weight="1100" fill="#7c2d12">MASALA</text>
  <text x="500" y="548" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="28" font-weight="800" fill="#111827" opacity="0.7">†'y E5'D-Á</text>

  <!-- Flavor chips -->
  <g>
    <rect x="190" y="610" width="180" height="44" rx="22" fill="#7c2d12" fill-opacity="0.10" stroke="#7c2d12" stroke-opacity="0.25"/>
    <text x="280" y="640" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="16" font-weight="800" fill="#7c2d12">Tangy</text>
    <rect x="410" y="610" width="180" height="44" rx="22" fill="#7c2d12" fill-opacity="0.10" stroke="#7c2d12" stroke-opacity="0.25"/>
    <text x="500" y="640" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="16" font-weight="800" fill="#7c2d12">Zesty</text>
    <rect x="630" y="610" width="180" height="44" rx="22" fill="#7c2d12" fill-opacity="0.10" stroke="#7c2d12" stroke-opacity="0.25"/>
    <text x="720" y="640" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="16" font-weight="800" fill="#7c2d12">Snack</text>
  </g>

